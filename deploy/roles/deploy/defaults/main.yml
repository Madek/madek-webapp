madek_webapp_clean_slate: false
madek_webapp_user: "{{madek_user}}"
madek_webapp_max_threads_per_worker: 4
madek_webapp_workers: "{{ (3/4*ansible_facts['processor_vcpus']) | round(0, 'ceil') | int }}"
madek_webapp_puma_worker_killer_enabled: yes
madek_webapp_puma_worker_killer_ram: '{{ (ansible_facts["memtotal_mb"] * 3/4) | round(0, "ceil")  | int}}'
