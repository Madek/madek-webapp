- name: Ensure sitemap directory is writable by madek_user
  file:
    path: {{madek_webapp_sitemap_target}}
    state: directory
    owner: "{{ madek_user }}"
    group: "{{ madek_user }}"
    mode: '0755'
    recurse: yes

- name: Trigger initial sitemap generation
  systemd:
    name: madek-produce-daily-sitemap-cron.service
    state: started

# --- DEBUG: Check Ansible paths before copying ---
- name: Echo playbook_dir
  debug:
    msg: "playbook_dir = {{ playbook_dir }}"

- name: Echo local sitemap src path
  debug:
    msg: "copy src = {{ playbook_dir }}/sitemaps/"

- name: Echo remote dest path
  debug:
    msg: "copy dest = {{madek_webapp_sitemap_target}}"
